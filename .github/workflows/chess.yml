name: Chess Game Bot

on:
  issues:
    types: [opened]

jobs:
  chess-move:
    if: startsWith(github.event.issue.title, 'chess:')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install chess.js
        run: npm install chess.js@1.1.0

      - name: Process chess move
        run: node .github/scripts/chess-move.js
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_USER: ${{ github.event.issue.user.login }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}

      - name: Commit updated board
        run: |
          git config user.name "Chess Bot 🤖"
          git config user.email "chess-bot@users.noreply.github.com"
          git add chess/
          git diff --staged --quiet || git commit -m "♟️ Chess: board updated"
          git push
